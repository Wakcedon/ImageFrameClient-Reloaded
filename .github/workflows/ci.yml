name: CI

on:
  push:
    branches: [ main, neoforge-* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Grant execute
        run: chmod +x gradlew
      - name: Build
        run: ./gradlew build --no-daemon
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: imageframeclient-artifacts
          path: |
            build/libs/*.jar
